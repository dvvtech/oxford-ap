<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmonizer Video Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            width: 100%;
        }
        .video-container {
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        video {
            width: 100%;
            height: auto;
            display: block;
        }
        .back-link {
            margin-top: 20px;
            text-align: center;
        }
        .back-link a {
            color: #fff;
            text-decoration: none;
            opacity: 0.8;
            font-size: 14px;
        }
        .back-link a:hover {
            opacity: 1;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="video-container">
            <video controls autoplay playsinline>
                <source src="harmonizer.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>        
    </div>
    
    <!-- Простая аналитика (опционально) -->
    <script>
        // Отслеживание начала просмотра
        document.querySelector('video').addEventListener('play', function() {
            console.log('Video started playing');
            // Здесь можно добавить Google Analytics или другую аналитику
        });
    </script>
</body>
</html>
